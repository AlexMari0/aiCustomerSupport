name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ai_customer_support
          POSTGRES_USER: support_user
          POSTGRES_PASSWORD: support_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U support_user -d ai_customer_support"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ai_customer_support
          DB_USERNAME: support_user
          DB_PASSWORD: support_password
        run: php artisan migrate --force
      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ai_customer_support
          DB_USERNAME: support_user
          DB_PASSWORD: support_password
        run: php artisan test

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
