services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-cs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_customer_support
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: support_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-cs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
